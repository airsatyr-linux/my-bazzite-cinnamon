name: Build Custom Bazzite Cinnamon

on:
  push:
    branches: [ "main" ]       # Сборка начнется, когда ты отправишь код в ветку main
  workflow_dispatch:           # Позволяет запустить сборку вручную кнопкой в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-latest    # Сборка идет на серверах GitHub (Linux Ubuntu)
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Скачивает твой код (Containerfile) на сервер сборки

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        # Нужен для эмуляции архитектуры, если собираешь не под x86_64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Подготавливает движок для сборки образов

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        # Авторизует сборку для загрузки промежуточного образа

      - name: Build and push image
        uses: ublue-os/bootc-image-builder-action@main
        with:
          containerfile: Containerfile
          image-name: my-bazzite-cinnamon
          image-tag: latest
          output-format: iso
          iso-label: "My Bazzite Cinnamon"
          iso-volume-id: "MY_BAZZITE_CINNAMON"

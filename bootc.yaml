# bootc.yaml - Конфигурация сборки образа

base: ghcr.io/ublue-os/bazzite-nvidia-open:stable

# Что удалить из базового образа (аналог rpm-ostree override remove)
remove:
  - "kde-*"
  - gnome-boxes
  - gnome-software
  - firefox
  - thunderbird
  - libreoffice*
  - vlc
  - totem
  - epiphany
  - gimp
  - inkscape
  - blender
  - flatpak
  - lutris

# Что установить дополнительно
install:
  - cinnamon
  - nemo
  - cinnamon-screensaver
  - lightdm
  - lightdm-gtk-greeter
  - network-manager-applet
  - alsa-utils
  - pulseaudio
  - pavucontrol
  - xdg-utils
  - xdg-user-dirs
  - dbus-x11
  - mutter
  - gnome-control-center

# Настройки ISO (эти параметры работают ВНУТРИ bootc.yaml, а не в workflow)
iso:
  label: "My Bazzite Cinnamon"
  volume_id: "MY_BAZZITE_CINNAMON"

# Пост-обработка (скрипты, которые выполняются внутри образа перед финальным коммитом)
post:
  # Включаем LightDM
  - systemctl enable lightdm
  
  # Отключаем анимации Cinnamon через dconf
  - |
    mkdir -p /etc/dconf/db/local.d
    cat > /etc/dconf/db/local.d/00-cinnamon-minimal <<EOF
    [org/cinnamon/desktop/effects]
    animations=false
    [org/cinnamon/desktop/wm/preferences]
    enable-animations=false
    EOF
    dconf update

  # Очистка кэша для уменьшения размера ISO
  - rm -rf /var/cache/dnf/* /var/tmp/* /tmp/*
  - dnf clean all

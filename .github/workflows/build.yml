name: Build Custom Bazzite Cinnamon

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU нужен только если собираешь под другую архитектуру (например, arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ГЛАВНОЕ ИЗМЕНЕНИЕ:
      # Мы НЕ передаем параметры containerfile, image-name и т.п.
      # Экшен сам найдет bootc.yaml в корне репозитория.
      - name: Build Image with bootc
        uses: ublue-os/bootc-image-builder-action@main
